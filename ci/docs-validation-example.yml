# docs-validation-example.yml
#
# Bloquea un PR si hay cambios de código sin cambios en /docs-system/.
# Implementa el enforcement del Momento 4 del framework.
#
# Cómo usar:
#   cp ci/docs-validation-example.yml .github/workflows/docs-validation.yml
#
# Cómo omitir (justificado):
#   Agregar "[skip-docs]" al título del PR — solo para cambios que no
#   afectan comportamiento (refactors internos, renombres, typos en tests).

name: Docs Validation

on:
  pull_request:
    branches: [main, master, develop]

jobs:
  validate-docs:
    name: docs-system updated?
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if docs-system updated alongside code changes
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"

          # Permitir omitir con [skip-docs] en el título del PR
          if echo "$PR_TITLE" | grep -q "\[skip-docs\]"; then
            echo "⚠️  [skip-docs] detectado — omitiendo validación de docs."
            echo "Asegurate de que este PR no modifica comportamiento observable."
            exit 0
          fi

          # Archivos de código modificados
          CODE_CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep -v '^docs-system/' \
            | grep -v '^\.github/' \
            | grep -v '^\.cursor/' \
            | grep -v '^\.agent/' \
            | grep -v 'README.md' \
            | grep -v 'CLAUDE.md' \
            | grep -v '\.windsurfrules' \
            | grep -v '\.clinerules' \
            | grep -E '\.(ts|tsx|js|jsx|py|go|rb|java|cs|php|swift|kt|rs)$' \
            | wc -l)

          # Archivos de docs-system modificados
          DOCS_CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep '^docs-system/' \
            | wc -l)

          echo "Archivos de código modificados: $CODE_CHANGED"
          echo "Archivos de docs-system modificados: $DOCS_CHANGED"

          if [ "$CODE_CHANGED" -gt 0 ] && [ "$DOCS_CHANGED" -eq 0 ]; then
            echo ""
            echo "❌ Este PR modifica código pero no actualiza /docs-system/"
            echo ""
            echo "Si el comportamiento cambia, al menos uno de estos archivos"
            echo "debe actualizarse en el mismo PR:"
            echo ""
            echo "  docs-system/PRODUCT_SURFACE.md      — capabilities, reglas de negocio"
            echo "  docs-system/USER_FLOW_MATRIX.md     — flujos afectados"
            echo "  docs-system/ARCHITECTURE.md         — cambios estructurales"
            echo "  docs-system/INTEGRATIONS.md         — nuevas APIs o contratos"
            echo "  docs-system/OPERATIONS.md           — cambios operativos"
            echo "  docs-system/TECHNICAL_DEBT_ROADMAP.md — deuda introducida o resuelta"
            echo "  docs-system/GAPS.md                 — gaps abiertos o cerrados"
            echo "  docs-system/PLATFORM_STATE.md       — cambio de estado del sistema"
            echo ""
            echo "Si este PR no modifica comportamiento observable (refactor interno,"
            echo "renombre, fix de typo en tests), agregá [skip-docs] al título del PR."
            echo ""
            echo "Ver ENGINEERING_GOVERNANCE.md — Momento 4 para más contexto."
            exit 1
          fi

          echo "✅ Validación de docs-system pasada."
